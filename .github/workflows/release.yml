name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package dist
        run: |
          asset_name="chat-${GITHUB_REF_NAME}-dist.zip"
          echo "asset_name=${asset_name}" >> "$GITHUB_ENV"
          # HTML/iframe 产物现在输出到 app-dist（dist 留给库构建）。
          # 重命名回 dist 以保持发布资产内部目录结构不变。
          mv app-dist dist
          zip -r "$asset_name" dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes ""
          fi

          gh release upload "$TAG_NAME" "$asset_name" --clobber
